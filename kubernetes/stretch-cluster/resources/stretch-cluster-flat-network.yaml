---
# Example: Stretch Cluster with Flat Network Mode
#
# This configuration uses the "flat" networking mode, which requires:
# - Pod IPs must be routable across all Kubernetes clusters
# - The operator manages Endpoints and EndpointSlices directly
# - No service mesh required
#
# Use this mode when:
# - You have a flat network fabric (e.g., Calico, Flannel with BGP)
# - Pod IPs are directly routable across cluster boundaries
# - You want to avoid service mesh complexity

apiVersion: cluster.redpanda.com/v1alpha2
kind: StretchCluster
metadata:
  name: redpanda-stretch-flat
  namespace: redpanda
spec:
  enterprise:
    licenseSecretRef:
      name: redpanda-license
      key: license

  image:
    repository: docker.redpanda.com/redpandadata/redpanda
    tag: v26.1.6

  # Flat network mode
  networking:
    crossClusterMode: flat

  auth:
    sasl:
      enabled: true
      secretRef: redpanda-superusers

  tls:
    enabled: true
    certs:
      default:
        caEnabled: true

  storage:
    persistentVolume:
      enabled: true
      size: 100Gi

  resources:
    limits:
      cpu: "4"
      memory: 8Gi
    requests:
      cpu: "2"
      memory: 4Gi

  config:
    cluster:
      default_topic_replications: 3
