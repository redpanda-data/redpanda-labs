kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: stretch-east
networking:
  # Disable default CNI - we'll use kindnet which provides flat networking
  disableDefaultCNI: false
  # Unique pod subnet for this cluster
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
  # API server will be accessible from other cluster
  apiServerAddress: "0.0.0.0"
nodes:
  - role: control-plane
    # Expose API server port
    extraPortMappings:
      - containerPort: 6443
        hostPort: 6443
        protocol: TCP
  - role: worker
