---
apiVersion: cluster.redpanda.com/v1alpha2
kind: NodePool
metadata:
  name: redpanda-stretch-east
  namespace: redpanda
  labels:
    cluster: redpanda-stretch
    region: us-east-1
spec:
  # Reference to the StretchCluster
  clusterRef:
    group: cluster.redpanda.com
    kind: StretchCluster
    name: redpanda-stretch

  # Number of brokers in this pool
  replicas: 3

  # Sidecar image for operator integration
  sidecarImage:
    repository: docker.redpanda.com/redpandadata/redpanda-operator
    tag: v26.1.2

  # Optional: Override Redpanda image for staged rollouts
  # image:
  #   repository: docker.redpanda.com/redpandadata/redpanda
  #   tag: v26.1.6

  # Node affinity to ensure brokers run in specific zones
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/region
              operator: In
              values:
                - us-east-1
            - key: topology.kubernetes.io/zone
              operator: In
              values:
                - us-east-1a
                - us-east-1b
                - us-east-1c

  # Pod anti-affinity to spread brokers across nodes
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/component
              operator: In
              values:
                - redpanda-statefulset
        topologyKey: kubernetes.io/hostname

  # Optional: Tolerations for dedicated nodes
  # tolerations:
  #   - key: "redpanda"
  #     operator: "Equal"
  #     value: "true"
  #     effect: "NoSchedule"

  # Optional: Storage override
  # storage:
  #   persistentVolume:
  #     size: 200Gi
  #     storageClass: premium-ssd

  # Optional: Resource override
  # resources:
  #   limits:
  #     cpu: "8"
  #     memory: 16Gi
