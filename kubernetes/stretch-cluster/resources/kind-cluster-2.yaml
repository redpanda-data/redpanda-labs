kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: stretch-west
networking:
  # Disable default CNI - we'll use kindnet which provides flat networking
  disableDefaultCNI: false
  # Different pod subnet to avoid overlap
  podSubnet: "10.245.0.0/16"
  serviceSubnet: "10.97.0.0/16"
  # API server will be accessible from other cluster
  apiServerAddress: "0.0.0.0"
nodes:
  - role: control-plane
    # Expose API server port on different host port
    extraPortMappings:
      - containerPort: 6443
        hostPort: 6444
        protocol: TCP
  - role: worker
